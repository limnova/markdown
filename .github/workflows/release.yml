name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-windows:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: .cargo-target-gha
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
      HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN != '' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows release bundles
        uses: tauri-apps/tauri-action@action-v0.6.0

      - name: Locate Windows installers
        id: locate_installers
        shell: pwsh
        run: |
          $workspace = (Resolve-Path ".").Path
          $bundleRoots = @(
            "$env:CARGO_TARGET_DIR/release/bundle",
            "src-tauri/$env:CARGO_TARGET_DIR/release/bundle",
            "src-tauri/target/release/bundle"
          )
          $msiFile = $null
          $setupFile = $null
          $bundleRootUsed = $null

          function Convert-ToWorkspaceRelativePath([string]$path, [string]$workspaceRoot) {
            $resolved = [System.IO.Path]::GetFullPath($path)
            if ($resolved.StartsWith($workspaceRoot, [System.StringComparison]::OrdinalIgnoreCase)) {
              return $resolved.Substring($workspaceRoot.Length + 1).Replace('\', '/')
            }

            return $resolved.Replace('\', '/')
          }

          foreach ($bundleRoot in $bundleRoots) {
            $candidateMsiFiles = @(Get-ChildItem -Path "$bundleRoot/msi/*.msi" -ErrorAction SilentlyContinue)
            $candidateSetupFiles = @(Get-ChildItem -Path "$bundleRoot/nsis/*-setup.exe" -ErrorAction SilentlyContinue)

            if ($candidateMsiFiles.Count -gt 0 -and $candidateSetupFiles.Count -gt 0) {
              $msiFile = $candidateMsiFiles[0]
              $setupFile = $candidateSetupFiles[0]
              $bundleRootUsed = $bundleRoot
              break
            }
          }

          if ($null -eq $msiFile -or $null -eq $setupFile) {
            Write-Host "Expected bundle roots:"
            $bundleRoots | ForEach-Object { Write-Host "- $_" }
            throw "Could not locate Windows installers under any expected bundle directory."
          }

          $msiPath = Convert-ToWorkspaceRelativePath $msiFile.FullName $workspace
          $setupPath = Convert-ToWorkspaceRelativePath $setupFile.FullName $workspace

          Add-Content -Path $env:GITHUB_OUTPUT -Value "bundle_root=$bundleRootUsed"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "msi_path=$msiPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "setup_path=$setupPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "artifact_paths<<EOF"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $msiPath
          Add-Content -Path $env:GITHUB_OUTPUT -Value $setupPath
          Add-Content -Path $env:GITHUB_OUTPUT -Value "EOF"

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers-${{ github.ref_name }}
          if-no-files-found: error
          path: ${{ steps.locate_installers.outputs.artifact_paths }}

      - name: Create draft GitHub release
        id: create_release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ env.RELEASE_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Markdown ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ${{ steps.locate_installers.outputs.artifact_paths }}
          fail_on_unmatched_files: false

      - name: Publish installer summary
        shell: pwsh
        run: |
          $releaseUrl = "${{ steps.create_release.outputs.url }}"
          $releaseOutcome = "${{ steps.create_release.outcome }}"
          $msiName = Split-Path "${{ steps.locate_installers.outputs.msi_path }}" -Leaf
          $setupName = Split-Path "${{ steps.locate_installers.outputs.setup_path }}" -Leaf
          $releaseLine = if (-not [string]::IsNullOrWhiteSpace($releaseUrl)) {
            "- Draft release: $releaseUrl"
          } elseif ($releaseOutcome -eq "failure" -and "$env:HAS_RELEASE_TOKEN" -eq "true") {
            "- Draft release: failed even with `RELEASE_TOKEN`; check the token scope and repository release permissions"
          } elseif ($releaseOutcome -eq "failure") {
            "- Draft release: skipped after permission failure with default `GITHUB_TOKEN` (set `RELEASE_TOKEN` to keep auto-publishing enabled)"
          } else {
            "- Draft release: not created"
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Windows Installers"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $releaseLine
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Bundle root: `' + '${{ steps.locate_installers.outputs.bundle_root }}' + '`')
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Workflow artifact: `' + 'windows-installers-${{ github.ref_name }}' + '`')
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- NSIS installer: `' + $setupName + '`')
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- MSI installer: `' + $msiName + '`')
