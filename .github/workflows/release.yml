name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-windows:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: ./.cargo-target-gha
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
      HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows release bundles
        uses: tauri-apps/tauri-action@action-v0.6.0

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            ${{ env.CARGO_TARGET_DIR }}/release/bundle/msi/*.msi
            ${{ env.CARGO_TARGET_DIR }}/release/bundle/nsis/*-setup.exe
            src-tauri/${{ env.CARGO_TARGET_DIR }}/release/bundle/msi/*.msi
            src-tauri/${{ env.CARGO_TARGET_DIR }}/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe

      - name: Create draft GitHub release
        id: create_release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ env.RELEASE_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Markdown ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ${{ env.CARGO_TARGET_DIR }}/release/bundle/msi/*.msi
            ${{ env.CARGO_TARGET_DIR }}/release/bundle/nsis/*-setup.exe
            src-tauri/${{ env.CARGO_TARGET_DIR }}/release/bundle/msi/*.msi
            src-tauri/${{ env.CARGO_TARGET_DIR }}/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
          fail_on_unmatched_files: true

      - name: Publish installer summary
        shell: pwsh
        run: |
          $bundleRoots = @(
            "$env:CARGO_TARGET_DIR/release/bundle",
            "src-tauri/$env:CARGO_TARGET_DIR/release/bundle",
            "src-tauri/target/release/bundle"
          )
          $msiFiles = @()
          $setupFiles = @()

          foreach ($bundleRoot in $bundleRoots) {
            $candidateMsiFiles = @(Get-ChildItem -Path "$bundleRoot/msi/*.msi" -ErrorAction SilentlyContinue)
            $candidateSetupFiles = @(Get-ChildItem -Path "$bundleRoot/nsis/*-setup.exe" -ErrorAction SilentlyContinue)

            if ($candidateMsiFiles.Count -gt 0 -and $candidateSetupFiles.Count -gt 0) {
              $msiFiles = $candidateMsiFiles
              $setupFiles = $candidateSetupFiles
              break
            }
          }

          if ($msiFiles.Count -eq 0 -or $setupFiles.Count -eq 0) {
            throw "Could not locate Windows installers under any expected bundle directory."
          }

          $releaseUrl = "${{ steps.create_release.outputs.url }}"
          $releaseOutcome = "${{ steps.create_release.outcome }}"
          $releaseLine = if (-not [string]::IsNullOrWhiteSpace($releaseUrl)) {
            "- Draft release: $releaseUrl"
          } elseif ($releaseOutcome -eq "failure" -and "$env:HAS_RELEASE_TOKEN" -eq "true") {
            "- Draft release: failed even with `RELEASE_TOKEN`; check the token scope and repository release permissions"
          } elseif ($releaseOutcome -eq "failure") {
            "- Draft release: skipped after permission failure with default `GITHUB_TOKEN` (set `RELEASE_TOKEN` to keep auto-publishing enabled)"
          } else {
            "- Draft release: not created"
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Windows Installers"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $releaseLine
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Workflow artifact: \`windows-installers-${{ github.ref_name }}\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- NSIS installer: \`$($setupFiles[0].Name)\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- MSI installer: \`$($msiFiles[0].Name)\`"
